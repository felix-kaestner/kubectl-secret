apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: secret
spec:
  version: v0.2.2
  shortDescription: View and edit Kubernetes secrets with base64-decoded values
  description: |
    View and edit Kubernetes secrets with all data fields base64-decoded.
    The view command prints secrets in a human-readable describe-style format.
    The edit command opens the secret in $EDITOR with decoded values and
    re-encodes them on save.
  homepage: https://github.com/felix-kaestner/kubectl-secret
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.2/kubectl-secret_linux_amd64.tar.gz
      sha256: "850239265efa286bc5713077990dce70da63f5184c6b235fbf52307deeee3009"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.2/kubectl-secret_linux_arm64.tar.gz
      sha256: "2941e466a088a41d06bffb68e0948ce6f8def802f72ba82da546104d844ac62d"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.2/kubectl-secret_darwin_amd64.tar.gz
      sha256: "d9b658a7e53da1c3943e075295311802b430eee968ac0b1d381808deb2ba17cd"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.2/kubectl-secret_darwin_arm64.tar.gz
      sha256: "20bcac2d50e29694067f16a9ef12e5b30d20b563bae9b12197c4d003eb4a6118"
      bin: kubectl-secret
