apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: secret
spec:
  version: v0.2.0
  shortDescription: View and edit Kubernetes secrets with base64-decoded values
  description: |
    View and edit Kubernetes secrets with all data fields base64-decoded.
    The view command prints secrets in a human-readable describe-style format.
    The edit command opens the secret in $EDITOR with decoded values and
    re-encodes them on save.
  homepage: https://github.com/felix-kaestner/kubectl-secret
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.0/kubectl-secret_linux_amd64.tar.gz
      sha256: "f5836f811889f62904f9bdd379b461a99355ca00dbd1f13ce826dc9a81cb1360"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.0/kubectl-secret_linux_arm64.tar.gz
      sha256: "2d709c40fbcbc62a66971bf8ffeda840a17edcb8949027ebc6564f9a5780e6e0"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.0/kubectl-secret_darwin_amd64.tar.gz
      sha256: "1a83ec11af558fb203af7d9fff4155a5e5bdb77e7e7ee485100e79e29050e2f8"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.0/kubectl-secret_darwin_arm64.tar.gz
      sha256: "3791d776213b53771860b00b1e6e2d6ecf6a9e12214a1c1ba7c4e0419550d9b6"
      bin: kubectl-secret
