apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: secret
spec:
  version: v0.2.1
  shortDescription: View and edit Kubernetes secrets with base64-decoded values
  description: |
    View and edit Kubernetes secrets with all data fields base64-decoded.
    The view command prints secrets in a human-readable describe-style format.
    The edit command opens the secret in $EDITOR with decoded values and
    re-encodes them on save.
  homepage: https://github.com/felix-kaestner/kubectl-secret
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.1/kubectl-secret_linux_amd64.tar.gz
      sha256: "40301d8aaf7209a28ba2571027984d5ff303577e02ab2a293ada40595ba10ede"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.1/kubectl-secret_linux_arm64.tar.gz
      sha256: "49a9ae818a9b9fb653b56d0a2e86b37744005c9696b4d1a7dccc0825c5415d58"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.1/kubectl-secret_darwin_amd64.tar.gz
      sha256: "98155d3ece0ee7590357421a17a2f133cb141573107f555917cb297d0271b520"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.2.1/kubectl-secret_darwin_arm64.tar.gz
      sha256: "5f59007809535b5151d56c2ad1128d0a8fb498c2664cecd87db2d03a7be04198"
      bin: kubectl-secret
