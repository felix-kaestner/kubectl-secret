apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: secret
spec:
  version: v0.3.0
  shortDescription: View and edit Kubernetes secrets with base64-decoded values
  description: |
    View and edit Kubernetes secrets with all data fields base64-decoded.
    The view command prints secrets in a human-readable describe-style format.
    The edit command opens the secret in $EDITOR with decoded values and
    re-encodes them on save.
  homepage: https://github.com/felix-kaestner/kubectl-secret
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.3.0/kubectl-secret_linux_amd64.tar.gz
      sha256: "1d45766f33ac51412dd58fcb99f7be8f8078a1df7434d628d41efc4503620b48"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.3.0/kubectl-secret_linux_arm64.tar.gz
      sha256: "f32a25bce3797030268d655076d62768cb3eb1febde3ba6e05e3ac6d85e3aa6d"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.3.0/kubectl-secret_darwin_amd64.tar.gz
      sha256: "28f6cc14e76c22e0853f8166b2608ad4c0c554d31fe5adcd11fd9f0126435f7b"
      bin: kubectl-secret
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/felix-kaestner/kubectl-secret/releases/download/v0.3.0/kubectl-secret_darwin_arm64.tar.gz
      sha256: "d4ee7d9c54c6692654e217fba4505fde52bc86a7a6e4b5535d85b719e0189714"
      bin: kubectl-secret
